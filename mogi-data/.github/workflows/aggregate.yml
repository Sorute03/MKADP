name: Aggregate Data

on:
  schedule:
    - cron: "0 * * * *"   # 毎時0分
  workflow_dispatch:

jobs:
  aggregate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Aggregate JSON
        run: |
          mkdir -p public
          node scripts/aggregate.js

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/aggregate.json
          git commit -m "update aggregate" || echo "No changes"
          git push
