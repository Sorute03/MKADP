name: Aggregate MKWorld Data

on:
  push:
    paths:
      - "data/*.json"

jobs:
  aggregate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Aggregate all user batch data
        run: |
          mkdir -p public/data
          echo '{"races":[]}' > public/data/all.json

          # 全 data/*.json を読み込んで races を結合
          for f in data/*.json; do
            jq -s '
              reduce .[] as $item ({"races": []};
                .races += $item.races
              )
            ' public/data/all.json "$f" > tmp.json
            mv tmp.json public/data/all.json
          done

      - name: Commit aggregated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/data/all.json
          git commit -m "Update aggregated MKWorld data" || echo "No changes"
          git push
