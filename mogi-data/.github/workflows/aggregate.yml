name: Aggregate All Race Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  aggregate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Prepare output directory
        run: mkdir -p mogi-data/public/data

      - name: Aggregate all JSON files
        run: |
          echo "[]" > all_data.json

          # data/*.json をすべて読み込んで配列に追加
          for file in data/*.json; do
            echo "Processing $file"
            jq -s '.[0] + [.[1]]' all_data.json "$file" > tmp.json
            mv tmp.json all_data.json
          done

          # userId ごとにグループ化し、batchId 重複を排除
          jq '
            group_by(.userId) |
            map({
              userId: .[0].userId,
              batches: (
                map({batchId, timestamp, races})
                | unique_by(.batchId)
              )
            })
          ' all_data.json > mogi-data/public/data/all.json

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add mogi-data/public/data/all.json
          git commit -m "Update all.json" || echo "No changes"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
