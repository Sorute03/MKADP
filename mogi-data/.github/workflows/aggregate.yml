name: Aggregate All Race Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"   # 毎時0分に実行（必要に応じて変更）

jobs:
  aggregate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Prepare output directory
        run: mkdir -p mogi-data/public/data

      - name: Aggregate all JSON files
        run: |
          echo "[]" > all_races.json

          # data/ フォルダ内の全 JSON を結合
          for file in data/*.json; do
            echo "Processing $file"
            jq -s '.[0] * .[1]' all_races.json <(jq '.races' "$file") > tmp.json
            mv tmp.json all_races.json
          done

          # 重複排除（同じ userId + batchId の races をまとめる）
          jq 'unique_by(.batchId)' all_races.json > all_unique.json

          # all.json として保存
          mv all_unique.json mogi-data/public/data/all.json

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add mogi-data/public/data/all.json
          git commit -m "Update all.json"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
