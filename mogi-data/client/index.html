<div style="margin: 20px 0;">

    <label>直近 N レースで比較：</label>
    <input id="rangeN" type="number" value="30" min="5" max="200" step="5">
    <button onclick="refreshModeView(allRecords)">再描画</button>

</div>

<script>
document.getElementById("openModalBtn").addEventListener("click", () => {
  document.getElementById("raceModal").classList.add("show");
});

document.getElementById("closeModalBtn").addEventListener("click", () => {
  document.getElementById("raceModal").classList.remove("show");
});

document.getElementById("raceModal").addEventListener("click", (e) => {
  if (e.target.id === "raceModal") {
    document.getElementById("raceModal").classList.remove("show");
  }
});
</script>
<script>
/* ▼ スコア計算 */
function calcScore(rank) {
  const table = {
    1: 15, 2: 12, 3: 10, 4: 9, 5: 8, 6: 7,
    7: 6, 8: 5, 9: 4, 10: 3, 11: 2, 12: 1
  };
  return table[rank] || 0;
}

/* ▼ モーダル要素 */
const modal = document.getElementById("raceModal");
const openModalBtn = document.getElementById("openModalBtn");

const saveRaceBtn = document.getElementById("saveRaceBtn");

const modalSeason = document.getElementById("modalSeason");
const modalRaceCount = document.getElementById("modalRaceCount");
const modalRaceInputs = document.getElementById("modalRaceInputs");

/* ▼ 初期化 */
function initModalSelectors() {
  modalTier.innerHTML = loungeTiers.filter(t => t !== "ALL").map(t => `<option>${t}</option>`).join("");
  modalSeason.innerHTML = ["S20","S21","S22","S23"].map(s => `<option>${s}</option>`).join("");
}

/* ▼ モード切替 */
modalMode.onchange = () => updateModalMode();

function updateModalMode() {
  const mode = modalMode.value;

  if (mode === "lounge") {
    modalTierBlock.style.display = "block";
    modalSeasonBlock.style.display = "block";
    modalRaceCountBlock.style.display = "none";
    modalLoungeInfo.style.display = "block";
    generateRaceInputs(12);
  } else {
    modalTierBlock.style.display = "none";
    modalSeasonBlock.style.display = "none";

/* ▼ 保存処理 */
saveRaceBtn.onclick = async () => {
  const mode = modalMode.value;
  const count = mode === "lounge" ? 12 : Number(modalRaceCount.value);

  const records = [];

  for (let i = 1; i <= count; i++) {
    const rank = Number(document.getElementById(`raceRank_${i}`).value);
    if (!rank) continue;

    const course = document.getElementById(`raceCourse_${i}`).value;

    records.push({
      mode,
      season: mode === "lounge" ? modalSeason.value : null,
      tier: mode === "lounge" ? modalTier.value : null,
      course,
      rank,
      score: calcScore(rank),
      timestamp: Date.now()
    });
  }

  if (records.length === 0) {
    alert("1レース以上入力してください");
    return;
  }

  const key = "loungeRecords";
  const old = JSON.parse(localStorage.getItem(key) || "[]");
  const merged = [...old, ...records];
  localStorage.setItem(key, JSON.stringify(merged));

  allRecords.push(...records);
  refreshModeView(allRecords);
  

  /* ▼ 追加：暗号化保存＋バックアップ */
  await saveAllRecords();
  downloadBackup();
  // ▼ 送信キューに追加（未送信データだけを1時間後に送る）
  const queue = JSON.parse(localStorage.getItem("sendQueue") || "[]");
  queue.push(...records);
  localStorage.setItem("sendQueue", JSON.stringify(queue));

  modal.classList.remove("show");
};

<script>
/* ==========
   共通データ
========== */
async function getAesKey() {
  let keyBase64 = localStorage.getItem("aesKey");

  // 初回だけキーを生成
  if (!keyBase64) {
    const raw = crypto.getRandomValues(new Uint8Array(32)); // 256bit
    keyBase64 = btoa(String.fromCharCode(...raw));
    localStorage.setItem("aesKey", keyBase64);
  }

  // Base64 → Uint8Array
  const raw = Uint8Array.from(atob(keyBase64), c => c.charCodeAt(0));

  return crypto.subtle.importKey(
    "raw",
    raw,
    "AES-GCM",
    false,
    ["encrypt", "decrypt"]
  );
}


async function encrypt(text) {
  const key = await getAesKey();
  const iv = crypto.getRandomValues(new Uint8Array(12));

  const encoded = new TextEncoder().encode(text);
  const cipher = await crypto.subtle.encrypt(
    { name: "AES-GCM", iv },
    key,
    encoded
  );

  const combined = new Uint8Array(iv.length + cipher.byteLength);
  combined.set(iv, 0);
  combined.set(new Uint8Array(cipher), iv.length);

  return btoa(String.fromCharCode(...combined));
}

async function decrypt(base64) {
  const key = await getAesKey();
  const data = Uint8Array.from(atob(base64), c => c.charCodeAt(0));

  const iv = data.slice(0, 12);
  const cipher = data.slice(12);

  const plain = await crypto.subtle.decrypt(
    { name: "AES-GCM", iv },
    key,
    cipher
  );

  return new TextDecoder().decode(plain);
}


/* ▼ セーブデータ生成 */
async function exportSaveData() {
  const json = JSON.stringify(allRecords);
  const encrypted = await encrypt(json);
  return encrypted;
}

/* ▼ セーブデータ復元 */
async function importSaveData(code) {
  const json = await decrypt(code);
  allRecords = JSON.parse(json);
  localStorage.setItem("loungeRecords", JSON.stringify(allRecords));
  localStorage.setItem("backup", code);
  refreshModeView(allRecords);
  renderRaceHistory();
}

/* ▼ 自動ダウンロードバックアップ */
async function downloadBackup() {
  const encrypted = await encrypt(JSON.stringify(allRecords));
  const blob = new Blob([encrypted], { type: "text/plain" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "MKWorld_backup.txt";
  a.click();

  URL.revokeObjectURL(url);
}

/* ▼ localStorage + backup 二重保存 */
async function saveAllRecords() {
  const json = JSON.stringify(allRecords);

  // メイン保存
  localStorage.setItem("loungeRecords", json);

  // バックアップ保存（暗号化）
  const encrypted = await encrypt(json);
  localStorage.setItem("backup", encrypted);
}

/* ▼ データ読み込み（壊れていたらバックアップから復元） */
async function loadAllRecords() {
  try {
    const main = localStorage.getItem("loungeRecords");
    if (main) {
      allRecords = JSON.parse(main);
      return;
    }

    const backup = localStorage.getItem("backup");
    if (backup) {
      const json = await decrypt(backup);
      allRecords = JSON.parse(json);
      return;
    }

    allRecords = [];
  } catch {
    allRecords = [];
  }
}

/* ==========
   ユーティリティ
========== */

function clone(obj) {
  return JSON.parse(JSON.stringify(obj));
}

function filterByModeAndRange(records) {
  const mode = document.getElementById("viewMode").value;
  const range = Number(document.getElementById("viewRange").value || 50);

  let filtered = records;
  if (mode !== "all") {
    filtered = filtered.filter(r => r.mode === mode);
  }

  // 直近 N レース
  filtered = clone(filtered).sort((a,b) => a.timestamp - b.timestamp);
  if (filtered.length > range) {
    filtered = filtered.slice(filtered.length - range);
  }
  return filtered;
}

function groupBy(records, keyFn) {
  const map = {};
  for (const r of records) {
    const k = keyFn(r);
    if (!map[k]) map[k] = [];
    map[k] = map[k].concat(r);
  }
  return map;
}

function calcStats(records) {
  if (!records.length) {
    return {
      count: 0,
      winRate: 0,
      avgRank: 0,
      avgScore: 0
    };
  }
  const count = records.length;
  const wins = records.filter(r => r.rank === 1).length;
  const sumRank = records.reduce((s,r) => s + (r.rank || 0), 0);
  const sumScore = records.reduce((s,r) => s + (r.score || 0), 0);

  return {
    count,
    winRate: wins / count,
    avgRank: sumRank / count,
    avgScore: sumScore / count
  };
}

/* ==========
   基本統計 & モード別グラフ
========== */

function refreshModeView(records) {
  const filtered = filterByModeAndRange(records);

  // 基本統計
  const statsAll = calcStats(filtered);
  const statsLounge = calcStats(filtered.filter(r => r.mode === "lounge"));
  const statsTournament = calcStats(filtered.filter(r => r.mode === "tournament"));
  const statsNora = calcStats(filtered.filter(r => r.mode === "nora"));

  const basicDiv = document.getElementById("basicStats");
  basicDiv.innerHTML = `
    <p>対象レース数：${statsAll.count}</p>
    <p>勝率：${(statsAll.winRate*100).toFixed(1)}% / 平均順位：${statsAll.avgRank.toFixed(2)} / 平均スコア：${statsAll.avgScore.toFixed(2)}</p>
    <p>ラウンジ：${statsLounge.count} / 大会：${statsTournament.count} / 野良：${statsNora.count}</p>
  `;

  // モード別集計
  const modes = ["lounge","tournament","nora"];
  const labels = ["ラウンジ","大会","野良"];
  const winRates = [];
  const avgRanks = [];
  const avgScores = [];

  for (const m of modes) {
    const s = calcStats(filtered.filter(r => r.mode === m));
    winRates.push(s.winRate * 100);
    avgRanks.push(s.avgRank || 0);
    avgScores.push(s.avgScore || 0);
  }

  // 勝率
  const ctxW = document.getElementById("chartWinRate").getContext("2d");
  if (chartWinRate) chartWinRate.destroy();
  chartWinRate = new Chart(ctxW, {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: "勝率(%)",
        data: winRates,
        backgroundColor: "rgba(54, 162, 235, 0.6)"
      }]
    },
    options: {
      responsive: true,
      scales: {
        y: { beginAtZero: true, max: 100 }
      }
    }
  });

  // 平均順位
  const ctxR = document.getElementById("chartAvgRank").getContext("2d");
  if (chartAvgRank) chartAvgRank.destroy();
  chartAvgRank = new Chart(ctxR, {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: "平均順位",
        data: avgRanks,
        backgroundColor: "rgba(255, 159, 64, 0.6)"
      }]
    },
    options: {
      responsive: true,
      scales: {
        y: { beginAtZero: true, max: 12 }
      }
    }
  });

  // 平均スコア
  const ctxS = document.getElementById("chartAvgScore").getContext("2d");
  if (chartAvgScore) chartAvgScore.destroy();
  chartAvgScore = new Chart(ctxS, {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: "平均スコア",
        data: avgScores,
        backgroundColor: "rgba(75, 192, 192, 0.6)"
      }]
    },
    options: {
      responsive: true,
      scales: {
        y: { beginAtZero: true }
      }
    }
  });

  // 以降のビューも更新
  updateGrowthView();
  updateRadarView();
  updateHeatmapView();
  updateRankingView();
  updateAICourseView();
  update3DView();
  updateScatterView();
}

/* ==========
   成長スコア（Tier × Season × Course）
========== */

function initGrowthSelectors() {
  const tierSel = document.getElementById("growthTier");
  const seasonSel = document.getElementById("growthSeason");
  const courseSel = document.getElementById("growthCourse");

  tierSel.innerHTML = loungeTiers.map(t => `<option value="${t}">${t}</option>`).join("");
  seasonSel.innerHTML = ["ALL","S20","S21","S22","S23"].map(s => `<option value="${s}">${s}</option>`).join("");

  // courseList は②で定義される前提
  courseSel.innerHTML = ["ALL"].concat(courseList).map(c => `<option value="${c}">${c}</option>`).join("");
}

function updateGrowthView() {
  if (!allRecords.length) return;

  const tierSel = document.getElementById("growthTier").value;
  const seasonSel = document.getElementById("growthSeason").value;
  const courseSel = document.getElementById("growthCourse").value;

  let records = filterByModeAndRange(allRecords).filter(r => r.mode === "lounge");

  if (tierSel !== "ALL") {
    records = records.filter(r => r.tier === tierSel);
  }
  if (seasonSel !== "ALL") {
    records = records.filter(r => r.season === seasonSel);
  }
  if (courseSel !== "ALL") {
    records = records.filter(r => r.course === courseSel);
  }

  if (!records.length) {
    if (chartGrowth) chartGrowth.destroy();
    return;
  }

  // 時系列順に並べて前半/後半で成長を見る
  records = clone(records).sort((a,b) => a.timestamp - b.timestamp);
  const mid = Math.floor(records.length / 2) || 1;
  const first = records.slice(0, mid);
  const last = records.slice(mid);

  const sFirst = calcStats(first);
  const sLast = calcStats(last);

  const labels = ["勝率(%)","平均スコア","平均順位(逆転)"];
  const before = [
    sFirst.winRate * 100,
    sFirst.avgScore,
    12 - (sFirst.avgRank || 12)
  ];
  const after = [
    sLast.winRate * 100,
    sLast.avgScore,
    12 - (sLast.avgRank || 12)
  ];

  const ctx = document.getElementById("chartGrowth").getContext("2d");
  if (chartGrowth) chartGrowth.destroy();
  chartGrowth = new Chart(ctx, {
    type: "radar",
    data: {
      labels,
      datasets: [
        {
          label: "前半",
          data: before,
          backgroundColor: "rgba(255, 99, 132, 0.2)",
          borderColor: "rgba(255, 99, 132, 1)"
        },
        {
          label: "後半",
          data: after,
          backgroundColor: "rgba(54, 162, 235, 0.2)",
          borderColor: "rgba(54, 162, 235, 1)"
        }
      ]
    },
    options: {
      responsive: true,
      scales: {
        r: { beginAtZero: true }
      }
    }
  });
}

/* ==========
   レーダー（コース別評価）
========== */

function initRadarSelector() {
  const sel = document.getElementById("radarCourse");
  sel.innerHTML = courseList.map(c => `<option value="${c}">${c}</option>`).join("");
}

function updateRadarView() {
  const course = document.getElementById("radarCourse").value;
  if (!course) return;

  const records = filterByModeAndRange(allRecords).filter(r => r.course === course);
  if (!records.length) {
    if (chartRadar) chartRadar.destroy();
    return;
  }

  const s = calcStats(records);

  // 指標：勝率, 平均スコア, 使用数, 平均順位(逆転)
  const labels = ["勝率(%)","平均スコア","使用数","平均順位(逆転)"];
  const data = [
    s.winRate * 100,
    s.avgScore,
    records.length,
    12 - (s.avgRank || 12)
  ];

  const ctx = document.getElementById("chartRadar").getContext("2d");
  if (chartRadar) chartRadar.destroy();
  chartRadar = new Chart(ctx, {
    type: "radar",
    data: {
      labels,
      datasets: [{
        label: course,
        data,
        backgroundColor: "rgba(153, 102, 255, 0.2)",
        borderColor: "rgba(153, 102, 255, 1)"
      }]
    },
    options: {
      responsive: true,
      scales: {
        r: { beginAtZero: true }
      }
    }
  });
}

/* ==========
   ヒートマップ（コース × 指標）
========== */

function updateHeatmapView() {
  const records = filterByModeAndRange(allRecords);
  if (!records.length) {
    if (chartHeatmap) chartHeatmap.destroy();
    return;
  }

  const byCourse = groupBy(records, r => r.course);
  const courses = Object.keys(byCourse);

  // 各コースの平均順位をヒートマップ風に
  const values = courses.map(c => {
    const s = calcStats(byCourse[c]);
    return s.avgRank || 12;
  });

  const ctx = document.getElementById("chartHeatmap").getContext("2d");
  if (chartHeatmap) chartHeatmap.destroy();
  chartHeatmap = new Chart(ctx, {
    type: "bar",
    data: {
      labels: courses,
      datasets: [{
        label: "平均順位（低いほど良い）",
        data: values,
        backgroundColor: values.map(v => {
          const t = (12 - v) / 12; // 0〜1
          const g = Math.round(255 * t);
          const r = Math.round(255 * (1 - t));
          return `rgba(${r},${g},100,0.8)`;
        })
      }]
    },
    options: {
      indexAxis: "y",
      responsive: true,
      plugins: {
        legend: { display: false }
      },
      scales: {
        x: { beginAtZero: true, max: 12 }
      }
    }
  });
}

/* ==========
   コースランキング（得意 / 苦手）
========== */

function updateRankingView() {
  const records = filterByModeAndRange(allRecords);
  if (!records.length) {
    document.getElementById("tableStrong").innerHTML = "";
    document.getElementById("tableWeak").innerHTML = "";
    return;
  }

  const byCourse = groupBy(records, r => r.course);
  const rows = [];

  for (const c of Object.keys(byCourse)) {
    const rs = byCourse[c];
    if (rs.length < 3) continue; // サンプル少なすぎるのは除外

    const s = calcStats(rs);
    const strongScore = (12 - (s.avgRank || 12)) * 2 + s.winRate * 100 + s.avgScore;
    const weakScore = (s.avgRank || 12) * 2 - s.winRate * 100 - s.avgScore;
    const growth = strongScore - weakScore;

    rows.push({
      course: c,
      count: rs.length,
      avgRank: s.avgRank,
      winRate: s.winRate,
      avgScore: s.avgScore,
      strongScore,
      weakScore,
      growth
    });
  }

  const strongSorted = clone(rows).sort((a,b) => b.strongScore - a.strongScore).slice(0,10);
  const weakSorted = clone(rows).sort((a,b) => b.weakScore - a.weakScore).slice(0,10);

  const strongTable = document.getElementById("tableStrong");
  const weakTable = document.getElementById("tableWeak");

  strongTable.innerHTML = `
    <tr>
      <th>コース</th><th>回数</th><th>勝率%</th><th>平均順位</th><th>平均スコア</th><th>得意スコア</th>
    </tr>
    ${strongSorted.map(r => `
      <tr>
        <td>${r.course}</td>
        <td>${r.count}</td>
        <td>${(r.winRate*100).toFixed(1)}</td>
        <td>${r.avgRank.toFixed(2)}</td>
        <td>${r.avgScore.toFixed(2)}</td>
        <td>${r.strongScore.toFixed(1)}</td>
      </tr>
    `).join("")}
  `;

  weakTable.innerHTML = `
    <tr>
      <th>コース</th><th>回数</th><th>勝率%</th><th>平均順位</th><th>平均スコア</th><th>苦手スコア</th>
    </tr>
    ${weakSorted.map(r => `
      <tr>
        <td>${r.course}</td>
        <td>${r.count}</td>
        <td>${(r.winRate*100).toFixed(1)}</td>
        <td>${r.avgRank.toFixed(2)}</td>
        <td>${r.avgScore.toFixed(2)}</td>
        <td>${r.weakScore.toFixed(1)}</td>
      </tr>
    `).join("")}
  `;
}

/* ==========
   AIコース評価
========== */

function initAISelector() {
  const sel = document.getElementById("aiCourse");
  sel.innerHTML = courseList.map(c => `<option value="${c}">${c}</option>`).join("");
}

function updateAICourseView() {
  const course = document.getElementById("aiCourse").value;
  const div = document.getElementById("aiCourseResult");
  if (!course) {
    div.innerHTML = "";
    return;
  }

  const records = filterByModeAndRange(allRecords).filter(r => r.course === course);
  if (!records.length) {
    div.innerHTML = "<p>データがありません。</p>";
    return;
  }

  const s = calcStats(records);
  const strongScore = (12 - (s.avgRank || 12)) * 2 + s.winRate * 100 + s.avgScore;
  const weakScore = (s.avgRank || 12) * 2 - s.winRate * 100 - s.avgScore;
  const growth = strongScore - weakScore;

  let verdict = "";
  if (strongScore > 140) verdict = "かなり得意なコースです。積極的に選んで良さそう。";
  else if (strongScore > 100) verdict = "得意寄りのコースです。状況次第で選択候補。";
  else if (weakScore > 120) verdict = "かなり苦手なコースです。避ける選択も検討。";
  else if (weakScore > 90) verdict = "やや苦手なコースです。慎重に扱いたい。";
  else verdict = "まだ評価が分かれるコースです。データを増やして判断しましょう。";

  div.innerHTML = `
    <p><strong>コース：</strong>${course}</p>
    <p><strong>試行回数：</strong>${records.length}</p>
    <p><strong>勝率：</strong>${(s.winRate*100).toFixed(1)}%</p>
    <p><strong>平均順位：</strong>${s.avgRank.toFixed(2)}</p>
    <p><strong>平均スコア：</strong>${s.avgScore.toFixed(2)}</p>
    <p><strong>得意スコア：</strong>${strongScore.toFixed(1)}</p>
    <p><strong>苦手スコア：</strong>${weakScore.toFixed(1)}</p>
    <p><strong>成長スコア：</strong>${growth.toFixed(1)}</p>
    <hr>
    <p>${verdict}</p>
  `;
}

/* ==========

========== */

function update3DView() {
  const records = filterByModeAndRange(allRecords);
  if (!records.length) {
    if (chart3D) chart3D.destroy();
    return;
  }

  const byCourse = groupBy(records, r => r.course);
  const points = [];

  for (const c of Object.keys(byCourse)) {
    const rs = byCourse[c];
    if (rs.length < 3) continue;

    const s = calcStats(rs);
    const strongScore = (12 - (s.avgRank || 12)) * 2 + s.winRate * 100 + s.avgScore;
    const weakScore = (s.avgRank || 12) * 2 - s.winRate * 100 - s.avgScore;
    const growth = strongScore - weakScore;

    points.push({
      x: strongScore,
      y: growth,
      r: Math.min(20, 5 + rs.length),
      label: c
    });
  }

  const ctx = document.getElementById("chart3D").getContext("2d");
  if (chart3D) chart3D.destroy();
  chart3D = new Chart(ctx, {
    type: "bubble",
    data: {
      datasets: [{
        label: "コース",
        data: points,
        backgroundColor: "rgba(54, 162, 235, 0.5)"
      }]
    },
    options: {
      parsing: false,
      plugins: {
        tooltip: {
          callbacks: {
            label: ctx => {
              const d = ctx.raw;
              return `${d.label} (強さ:${d.x.toFixed(1)}, 成長:${d.y.toFixed(1)})`;
            }
          }
        }
      },
      scales: {
        x: { title: { display: true, text: "強さスコア" } },
        y: { title: { display: true, text: "成長スコア" } }
      }
    }
  });
}

/* ============================================================
   ▼ 固定コピー対策ID（ユーザーID）生成
   ============================================================ */
function getUserCopyId() {
  let id = localStorage.getItem("userCopyId");
  if (!id) {
    const unixSec = Math.floor(Date.now() / 1000);
    const rand = Math.floor(100000 + Math.random() * 900000);
    id = `U-${unixSec}-${rand}`;
    localStorage.setItem("userCopyId", id);
  }
  return id;
}

/* ============================================================
   ▼ 1時間バッチID生成
   ============================================================ */
function generateBatchId() {
  const unixSec = Math.floor(Date.now() / 1000);
  const rand = Math.floor(100000 + Math.random() * 900000);
  return `${unixSec}-${rand}`;
}

/* ============================================================
   ▼ 1時間ごとの送信処理
   ============================================================ */
setInterval(sendDataToGitHub, 3600000);
// 初回送信したいならコメント解除
// sendDataToGitHub();

async function sendDataToGitHub() {
  const queue = JSON.parse(localStorage.getItem("sendQueue") || "[]");
  if (!queue.length) return;

  const userId = getUserCopyId();      // 固定コピーID
  const batchId = generateBatchId();   // 1時間バッチID

  // 公開用データに変換（匿名化）
  const publicRaces = queue.map(r => ({
    mode: r.mode,
    season: r.season,
    tier: r.tier,
    course: r.course,
    rank: r.rank,
    score: r.score
  }));

  const payload = {
    userId,
    batchId,
    timestamp: Math.floor(Date.now() / 1000),
    races: publicRaces
  };

  const fileName = `data/${userId}_${batchId}.json`;
  const content = btoa(JSON.stringify(payload, null, 2));
  const res = await fetch(`https://api.github.com/repos/Sorute03/MKADP/contents/${fileName}`, {
    method: "PUT",
    headers: {
      "Authorization": "token12345", // ← Fine-grained Token
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: "add batch data",
      content: content,          // ← Base64エンコード済みの文字列
      sha: undefined             // ← 新規作成なので不要（上書き時のみ必要）
    })
  });
  
  if (res.ok) {
    console.log("送信成功:", batchId);
    localStorage.setItem("sendQueue", "[]"); // キューを空にする
  } else {
    const errorText = await res.text();
    console.log("送信失敗 → 次の1時間に再試行");
    console.log(errorText);
  }
}
