        /* ===========================
       全体
    =========================== */
    body {
      font-family: "Noto Sans JP", sans-serif;
      margin: 20px;
      background: #f8fdf8;
      color: #222;
    }
    
    /* ===========================
       見出し
    =========================== */
    h2 {
      font-size: 26px;
      font-weight: bold;
      color: #27ae60;
      margin-bottom: 20px;
    }
    
    h3, h4 {
      color: #27ae60;
      margin-top: 28px;
    }
    
    /* ===========================
       ボタン（共通）
    =========================== */
    button {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }
    
    button:hover {
      opacity: 0.85;
    }
    
    #exportSaveBtn,
    #importSaveBtn {
      background: #2ecc71;
      color: #fff;
    }
    
    /* ===========================
       タブボタン
    =========================== */
    .tabBtn {
      padding: 10px 18px;
      border-radius: 6px;
      border: 1px solid #27ae60;
      background: #fff;
      color: #27ae60;
      cursor: pointer;
      font-weight: bold;
      margin-right: 6px;
      transition: 0.2s;
    }
    
    .tabBtn.active {
      background: #27ae60;
      color: #fff;
    }
    
    .tabBtn:hover {
      background: #e8f9ee;
    }
    
    /* ===========================
       セクションブロック
    =========================== */
    .section-block {
      padding: 16px;
      margin-bottom: 24px;
      background: #ffffff;
      border-radius: 10px;
      border: 1px solid #d8f3dd;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }
    
    /* ===========================
       入力フォーム
    =========================== */
    input, select {
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin-top: 6px;
      margin-bottom: 10px;
      width: 100%;
    }
    
    input:focus, select:focus {
      border-color: #27ae60;
      outline: none;
    }
    
    /* ===========================
       グラフ（canvas）
    =========================== */
    canvas {
      background: #fff;
      border: 1px solid #d8f3dd;
      border-radius: 8px;
      margin-top: 12px;
      padding: 8px;
    }
    
    /* ===========================
       レース一覧
    =========================== */
    #raceHistoryList div {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }
    
    #raceHistoryList button {
      background: #e74c3c;
      color: #fff;
      padding: 4px 10px;
      border-radius: 4px;
    }
    
    /* ===========================
       モーダル（緑テーマ）
    =========================== */
    #raceModal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(3px);
      justify-content: center;
      align-items: center;
      z-index: 9998;
    }
    
    #raceModal.show {
      display: flex !important;
      animation: fadeIn 0.2s ease-out;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    
    #raceModal > div {
      background: #ffffff;
      padding: 24px;
      width: 95%;
      max-width: 520px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      max-height: 90%;
      overflow-y: auto;
    }
    
    #raceModal h3 {
      margin-top: 0;
      margin-bottom: 16px;
      color: #27ae60;
    }
    
    #raceModal label {
      font-weight: bold;
      color: #27ae60;
    }
    
    #raceModal select,
    #raceModal input[type="number"],
    #raceModal input[type="text"] {
      width: 100%;
      padding: 8px;
      margin: 4px 0 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
    
    #raceModal select:focus,
    #raceModal input:focus {
      border-color: #27ae60;
      outline: none;
    }
    
    /* レース入力カード */
    #modalRaceInputs > div {
      padding: 10px;
      border: 1px solid #d8f3dd !important;
      margin-bottom: 10px;
      border-radius: 8px;
      background: #f8fdf8;
    }
    
    /* ボタン */
    #closeModalBtn,
    #saveRaceBtn {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    
    #closeModalBtn {
      background: #cccccc;
      color: #333;
      margin-right: 8px;
    }
    
    #saveRaceBtn {
      background: #2ecc71;
      color: #ffffff;
    }
    
    #closeModalBtn:hover {
      background: #b3b3b3;
    }
    
    #saveRaceBtn:hover {
      background: #27ae60;
    }

       右下の「＋ レース登録」ボタン

      position: fixed;
      bottom: 24px;
      right: 24px;

      background: #2ecc71;
      color: #fff;
      border: none;
      border-radius: 50px;

      z-index: 9999;
    }
    
    #openModalBtn:hover {
      background: #27ae60;
    }

<script>
/* ▼ スコア計算 */
function calcScore(rank) {
  const table = {
    1: 15,  2: 12,  3: 10, 4: 9,  5: 9,  6: 8,
    7: 8,   8: 7,   9: 7,  10: 6, 11: 6, 12: 6,
    13: 5, 14: 5, 15: 5, 16: 4, 17: 4, 18: 4,
    19: 3, 20: 3, 21: 3, 22: 2, 23: 2, 24: 1
  };
  return table[rank] || 0;
}

/* ▼ モーダル要素 */
const modal = document.getElementById("raceModal");
const openModalBtn = document.getElementById("openModalBtn");
const closeModalBtn = document.getElementById("closeModalBtn");
const saveRaceBtn = document.getElementById("saveRaceBtn");

const modalMode = document.getElementById("modalMode");
const modalTierBlock = document.getElementById("modalTierBlock");
const modalSeasonBlock = document.getElementById("modalSeasonBlock");
const modalRaceCountBlock = document.getElementById("modalRaceCountBlock");
const modalLoungeInfo = document.getElementById("modalLoungeInfo");

const modalTier = document.getElementById("modalTier");
const modalSeason = document.getElementById("modalSeason");
const modalRaceCount = document.getElementById("modalRaceCount");
const modalRaceInputs = document.getElementById("modalRaceInputs");

/* ▼ 初期化 */
function initModalSelectors() {
  // Tier（既存）
  modalTier.innerHTML = loungeTiers
    .filter(t => t !== "ALL")
    .map(t => `<option value="${t}">${t}</option>`)
    .join("");

  // Season（S1〜S30）
  modalSeason.innerHTML = Array.from({ length: 30 }, (_, i) => {
    const s = i + 1;
    return `<option value="S${s}">S${s}</option>`;
  }).join("");
}

/* ▼ モード切替 */
modalMode.onchange = () => updateModalMode();

function updateModalMode() {
  const mode = modalMode.value;

  if (mode === "lounge") {
    modalTierBlock.style.display = "block";
    modalSeasonBlock.style.display = "block";
    modalRaceCountBlock.style.display = "none";
    modalLoungeInfo.style.display = "block";
    generateRaceInputs(12);
  } else {
    modalTierBlock.style.display = "none";
    modalSeasonBlock.style.display = "none";
    modalRaceCountBlock.style.display = "block";
    modalLoungeInfo.style.display = "none";
    generateRaceInputs(Number(modalRaceCount.value));
  }
}

/* ▼ レース数変更（大会・野良） */
modalRaceCount.onchange = () => {
  generateRaceInputs(Number(modalRaceCount.value));
};

/* ▼ レース入力欄生成 */
function generateRaceInputs(count) {
  modalRaceInputs.innerHTML = "";

  for (let i = 1; i <= count; i++) {
    modalRaceInputs.innerHTML += `
      <div style="padding:10px; border:1px solid #ddd; margin-bottom:10px; border-radius:6px;">
        <strong>${i} レース目</strong><br>

        <label>コース</label><br>
        <select id="raceCourse_${i}" style="width:100%; margin-bottom:8px;">
          ${courseList.map(c => `<option>${c}</option>`).join("")}
        </select>

        <label>順位</label><br>
        <select id="raceRank_${i}" style="width:100%; margin-bottom:8px;">
          ${Array.from({length: 24}, (_, n) => `<option value="${n+1}">${n+1}</option>`).join("")}
        </select>

        <label>スコア（自動）</label><br>
        <input id="raceScore_${i}" type="number" readonly style="width:100%; background:#eee;">
      </div>
    `;
  }

  for (let i = 1; i <= count; i++) {
    const rankInput = document.getElementById(`raceRank_${i}`);
    const scoreInput = document.getElementById(`raceScore_${i}`);

    rankInput.onchange = () => {
      scoreInput.value = calcScore(Number(rankInput.value));
    };
  }
}



/* ▼ モーダル開閉 */
openModalBtn.onclick = () => {
  initModalSelectors();
  updateModalMode();
  modal.classList.add("show");
};

closeModalBtn.onclick = () => {
  modal.classList.remove("show");
};

/* ▼ 保存処理 */
saveRaceBtn.onclick = async () => {
  const mode = modalMode.value;
  const count = mode === "lounge" ? 12 : Number(modalRaceCount.value);

  const records = [];

  for (let i = 1; i <= count; i++) {
    const rank = Number(document.getElementById(`raceRank_${i}`).value);
    if (!rank) continue;

    const course = document.getElementById(`raceCourse_${i}`).value;

    records.push({
      mode,
      season: mode === "lounge" ? modalSeason.value : null,
      tier: mode === "lounge" ? modalTier.value : null,
      course,
      rank,
      score: calcScore(rank),
      timestamp: Date.now()
    });
  }

  if (records.length === 0) {
    alert("1レース以上入力してください");
    return;
  }

  const key = "loungeRecords";
  const old = JSON.parse(localStorage.getItem(key) || "[]");
  const merged = [...old, ...records];
  localStorage.setItem(key, JSON.stringify(merged));

  allRecords.push(...records);
  refreshModeView(allRecords);
  

  /* ▼ 追加：暗号化保存＋バックアップ */
  await saveAllRecords();
  downloadBackup();
  // ▼ 送信キューに追加（未送信データだけを1時間後に送る）
  const queue = JSON.parse(localStorage.getItem("sendQueue") || "[]");
  queue.push(...records);
  localStorage.setItem("sendQueue", JSON.stringify(queue));

  modal.classList.remove("show");
};

<script>
/* ==========
   共通データ
========== */
async function getAesKey() {
  let keyBase64 = localStorage.getItem("aesKey");

  // 初回だけキーを生成
  if (!keyBase64) {
    const raw = crypto.getRandomValues(new Uint8Array(32)); // 256bit
    keyBase64 = btoa(String.fromCharCode(...raw));
    localStorage.setItem("aesKey", keyBase64);
  }

  // Base64 → Uint8Array
  const raw = Uint8Array.from(atob(keyBase64), c => c.charCodeAt(0));

  return crypto.subtle.importKey(
    "raw",
    raw,
    "AES-GCM",
    false,
    ["encrypt", "decrypt"]
  );
}


async function encrypt(text) {
  const key = await getAesKey();
  const iv = crypto.getRandomValues(new Uint8Array(12));

  const encoded = new TextEncoder().encode(text);
  const cipher = await crypto.subtle.encrypt(
    { name: "AES-GCM", iv },
    key,
    encoded
  );

  const combined = new Uint8Array(iv.length + cipher.byteLength);
  combined.set(iv, 0);
  combined.set(new Uint8Array(cipher), iv.length);

  // ★ ここを修正
  return bytesToBase64(combined);
}

async function decrypt(base64) {
  const key = await getAesKey();

  // ★ ここを修正
  const data = base64ToBytes(base64);

  const iv = data.slice(0, 12);
  const cipher = data.slice(12);

  const plain = await crypto.subtle.decrypt(
    { name: "AES-GCM", iv },
    key,
    cipher
  );

  return new TextDecoder().decode(plain);
}



/* ▼ セーブデータ生成 */
async function exportSaveData() {
  const json = JSON.stringify(allRecords);
  const encrypted = await encrypt(json);
  return encrypted;
}

/* ▼ セーブデータ復元 */
async function importSaveData(code) {
  const json = await decrypt(code);
  allRecords = JSON.parse(json);
  localStorage.setItem("loungeRecords", JSON.stringify(allRecords));
  localStorage.setItem("backup", code);
  refreshModeView(allRecords);
  renderRaceHistory();
}

/* ▼ 自動ダウンロードバックアップ */
async function downloadBackup() {
  const encrypted = await encrypt(JSON.stringify(allRecords));
  const blob = new Blob([encrypted], { type: "text/plain" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "MKWorld_backup.txt";
  a.click();

  URL.revokeObjectURL(url);
}

function bytesToBase64(bytes) {
  let binary = "";
  const len = bytes.byteLength;
  for (let i = 0; i < len; i++) {
    binary += String.fromCharCode(bytes[i]);
  }
  return btoa(binary);
}

function base64ToBytes(base64) {
  const binary = atob(base64);
  const len = binary.length;
  const bytes = new Uint8Array(len);
  for (let i = 0; i < len; i++) {
    bytes[i] = binary.charCodeAt(i);
  }
  return bytes;
}


/* ▼ localStorage + backup 二重保存 */
async function saveAllRecords() {
  const json = JSON.stringify(allRecords);

  // メイン保存
  localStorage.setItem("loungeRecords", json);

  // バックアップ保存（暗号化）
  const encrypted = await encrypt(json);
  localStorage.setItem("backup", encrypted);
}

/* ▼ データ読み込み（壊れていたらバックアップから復元） */
async function loadAllRecords() {
  try {
    const main = localStorage.getItem("loungeRecords");
    if (main) {
      allRecords = JSON.parse(main);
      return;
    }

    const backup = localStorage.getItem("backup");
    if (backup) {
      const json = await decrypt(backup);
      allRecords = JSON.parse(json);
      return;
    }

    allRecords = [];
  } catch {
    allRecords = [];
  }
}

function normalizeSeason(raw) {
  if (!raw) return "";
  const num = raw.replace(/[^0-9]/g, "");
  if (!num) return "";
  return "S" + Number(num);
}

/* ==========
   ユーティリティ
========== */

function clone(obj) {
  return JSON.parse(JSON.stringify(obj));
}

function filterByModeAndRange(records, {
  mode = "ALL",
  season = "ALL",
  tier = "ALL",
  course = "ALL",
  range = "ALL"
} = {}) {

  let filtered = records;

  // ▼ モード
  if (mode !== "ALL") {
    filtered = filtered.filter(r => r.mode === mode);
  }

  // ▼ シーズン
  if (season !== "ALL") {
    filtered = filtered.filter(r => r.season === season);
  }

  // ▼ ティア
  if (tier !== "ALL") {
    filtered = filtered.filter(r => r.tier === tier);
  }

  // ▼ コース
  if (course !== "ALL") {
    filtered = filtered.filter(r => r.course === course);
  }

  // ▼ レンジ（最後の N 件）
  if (range !== "ALL") {
    const n = Number(range);
    filtered = filtered.slice(-n);
  }

  return filtered;
}

function groupBy(records, keyFn) {
  const map = {};
  for (const r of records) {
    const k = keyFn(r);
    if (!map[k]) map[k] = [];
    map[k] = map[k].concat(r);
  }
  return map;
}

function calcStats(records) {
  if (!records.length) {
    return { count: 0, winRate: 0, avgRank: 0, avgScore: 0 };
  }
  const count = records.length;

  // ★ 勝利条件：3位以内
  const wins = records.filter(r => r.rank <= 3).length;

  const sumRank = records.reduce((s,r) => s + r.rank, 0);
  const sumScore = records.reduce((s,r) => s + r.score, 0);

  return {
    count,
    winRate: wins / count,
    avgRank: sumRank / count,
    avgScore: sumScore / count
  };
}

function updateGrowthView() {
  if (!allRecords.length) return;

  const tierSel = document.getElementById("growthTier").value;
  const seasonSel = document.getElementById("growthSeason").value;
  const courseSel = document.getElementById("growthCourse").value;

  let records = filterByModeAndRange(allRecords).filter(r => r.mode === "lounge");

  if (tierSel !== "ALL") {
    records = records.filter(r => r.tier === tierSel);
  }
  if (seasonSel !== "ALL") {
    records = records.filter(r => r.season === seasonSel);
  }
  if (courseSel !== "ALL") {
    records = records.filter(r => r.course === courseSel);
  }

  if (!records.length) {
    if (chartGrowth) chartGrowth.destroy();
    return;
  }

  // 時系列順に並べて前半/後半で成長を見る
  records = clone(records).sort((a,b) => a.timestamp - b.timestamp);
  const mid = Math.floor(records.length / 2) || 1;
  const first = records.slice(0, mid);
  const last = records.slice(mid);

  const sFirst = calcStats(first);
  const sLast = calcStats(last);

  const labels = ["勝率(%)","平均スコア","平均順位(逆転)"];
  const before = [
    sFirst.winRate * 100,
    sFirst.avgScore,
    12 - (sFirst.avgRank || 12)
  ];
  const after = [
    sLast.winRate * 100,
    sLast.avgScore,
    12 - (sLast.avgRank || 12)
  ];

  const ctx = document.getElementById("chartGrowth").getContext("2d");
  if (chartGrowth) chartGrowth.destroy();
  chartGrowth = new Chart(ctx, {
    type: "radar",
    data: {
      labels,
      datasets: [
        {
          label: "前半",
          data: before,
          backgroundColor: "rgba(255, 99, 132, 0.2)",
          borderColor: "rgba(255, 99, 132, 1)"
        },
        {
          label: "後半",
          data: after,
          backgroundColor: "rgba(54, 162, 235, 0.2)",
          borderColor: "rgba(54, 162, 235, 1)"
        }

    options: {
      responsive: true,

/* ==========
   コースランキング（得意 / 苦手）
========== */

function updateRankingView() {
  const minRunsInput = document.getElementById("minRuns");
  const minRuns = Number(minRunsInput ? minRunsInput.value : 3);

  const records = filterByModeAndRange(allRecords);
  if (!records.length) {
    document.getElementById("tableStrong").innerHTML = "";
    document.getElementById("tableWeak").innerHTML = "";
    return;
  }

  const byCourse = groupBy(records, r => r.course);
  const rows = [];

  for (const c of Object.keys(byCourse)) {
    const rs = byCourse[c];

    if (rs.length < minRuns) continue;

    const s = calcStats(rs);

    const strongScore = (12 - (s.avgRank || 12)) * 2 + s.winRate * 100 + s.avgScore;
    const weakScore = (s.avgRank || 12) * 2 - s.winRate * 100 - s.avgScore;
    const growth = strongScore - weakScore;

    rows.push({
      course: c,
      count: rs.length,
      avgRank: s.avgRank,
      winRate: s.winRate,
      avgScore: s.avgScore,
      strongScore,
      weakScore,
      growth
    });
  }

  const strongSorted = clone(rows).sort((a,b) => b.strongScore - a.strongScore).slice(0,10);
  const weakSorted = clone(rows).sort((a,b) => b.weakScore - a.weakScore).slice(0,10);

  const strongTable = document.getElementById("tableStrong");
  const weakTable = document.getElementById("tableWeak");

  strongTable.innerHTML = `
    <tr>
      <th>コース</th><th>回数</th><th>勝率%</th><th>平均順位</th><th>平均スコア</th><th>得意スコア</th>
    </tr>
    ${strongSorted.map(r => `
      <tr>
        <td>${r.course}</td>
        <td>${r.count}</td>
        <td>${(r.winRate*100).toFixed(1)}</td>
        <td>${r.avgRank.toFixed(2)}</td>
        <td>${r.avgScore.toFixed(2)}</td>
        <td>${r.strongScore.toFixed(1)}</td>
      </tr>
    `).join("")}
  `;

  weakTable.innerHTML = `
    <tr>
      <th>コース</th><th>回数</th><th>勝率%</th><th>平均順位</th><th>平均スコア</th><th>苦手スコア</th>
    </tr>
    ${weakSorted.map(r => `
      <tr>
        <td>${r.course}</td>
        <td>${r.count}</td>
        <td>${(r.winRate*100).toFixed(1)}</td>
        <td>${r.avgRank.toFixed(2)}</td>
        <td>${r.avgScore.toFixed(2)}</td>
        <td>${r.weakScore.toFixed(1)}</td>
      </tr>
    `).join("")}
  `;
}

function getWinRate(filtered) {
  if (!filtered.length) return 0;
  const wins = filtered.filter(r => r.rank <= 3).length;
  return wins / filtered.length;
}

function filterByModeAndRange(records, {
  mode = "ALL",
  season = "ALL",
  tier = "ALL",
  course = "ALL",
  range = "ALL"
} = {}) {

  let filtered = records;

  if (mode !== "ALL") {
    filtered = filtered.filter(r => r.mode === mode);
  }

  if (season !== "ALL") {
    filtered = filtered.filter(r => r.season === season);
  }

  if (tier !== "ALL") {
    filtered = filtered.filter(r => r.tier === tier);
  }

  if (course !== "ALL") {
    filtered = filtered.filter(r => r.course === course);
  }

  if (range !== "ALL") {
    const n = Number(range);
    filtered = filtered.slice(-n);
  }

  return filtered;
}


/* ============================================================
   ▼ 固定コピー対策ID（ユーザーID）生成
   ============================================================ */
function getUserCopyId() {
  let id = localStorage.getItem("userCopyId");
  if (!id) {
    const unixSec = Math.floor(Date.now() / 1000);
    const rand = Math.floor(100000 + Math.random() * 900000);
    id = `U-${unixSec}-${rand}`;
    localStorage.setItem("userCopyId", id);
  }
  return id;
}

/* ============================================================
   ▼ バッチID生成（6時間に1回送信）
   ============================================================ */
function generateBatchId() {
  const unixSec = Math.floor(Date.now() / 1000);
  const rand = Math.floor(100000 + Math.random() * 900000);
  return `${unixSec}-${rand}`;
}

/* ============================================================
   ▼ 6時間に1回だけ送信する判定
   ============================================================ */
function shouldSendNow() {
  const lastSent = Number(localStorage.getItem("lastSent") || 0);
  const now = Date.now();
  const SIX_HOURS = 6 * 60 * 60 * 1000; // 6時間

  return now - lastSent >= SIX_HOURS;
}

/* ============================================================
   ▼ Cloudflare Worker に送信（6時間に1回）
   ============================================================ */
async function sendDataToWorker() {
  const queue = JSON.parse(localStorage.getItem("sendQueue") || "[]");
  if (!queue.length) return;

  if (!shouldSendNow()) {
    console.log("まだ送信しない（6時間に1回）");
    return;
  }

  const payload = {
    userId: getUserCopyId(),
    batchId: generateBatchId(),
    timestamp: Math.floor(Date.now() / 1000),
    races: queue
  };

  try {
    const res = await fetch("https://mkadp.haruto-mori0602.workers.dev/", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload)
    });

    if (res.ok) {
      console.log("送信完了（6時間に1回）");
      localStorage.setItem("sendQueue", "[]");
      localStorage.setItem("lastSent", Date.now());
    } else {
      console.log("送信失敗 → 次の6時間後に再試行");
      console.log(await res.text());
    }
  } catch (e) {
    console.log("送信エラー → 次の6時間後に再試行");
    console.error(e);
  }
}

/* ============================================================
   ▼ 自動送信チェック（5分ごと）
   ============================================================ */
setInterval(() => {
  sendDataToWorker();
}, 5 * 60 * 1000); // 5分ごとにチェック
