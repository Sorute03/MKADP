<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>全体集計ダッシュボード</title>
<style>
body { font-family: sans-serif; padding: 20px; }
h1 { margin-bottom: 20px; }
h2 { margin-top: 40px; }
.list { margin-top: 10px; }
.item { padding: 6px 0; border-bottom: 1px solid #ddd; }
.rank { font-weight: bold; margin-right: 10px; }
.section { margin-top: 30px; }
select { padding: 8px; font-size: 16px; }
a { color: #0077cc; text-decoration: none; }
a:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>全体集計ダッシュボード</h1>

<div class="section">
  <h2>全体ランキング（コース別）</h2>
  <div id="overallList" class="list"></div>
</div>

<div class="section">
  <h2>Tier別ランキング</h2>
  <select id="tierSelect"></select>
  <div id="tierList" class="list"></div>
</div>

<div class="section">
  <h2>Season別ランキング</h2>
  <select id="seasonSelect"></select>
  <div id="seasonList" class="list"></div>
</div>

<div class="section">
  <h2>日別ランキング</h2>
  <select id="dailySelect"></select>
  <div id="dailyList" class="list"></div>
</div>

<div class="section">
  <h2>月別ランキング</h2>
  <select id="monthlySelect"></select>
  <div id="monthlyList" class="list"></div>
</div>

<script>
/* ============================
   ▼ all.json を読み込む
============================ */
async function loadAllData() {
  const res = await fetch("data/all.json");
  const json = await res.json();
  return json.races;
}

/* ============================
   ▼ コース別集計
============================ */
function aggregateByCourse(races) {
  const map = {};

  for (const r of races) {
    if (!map[r.course]) {
      map[r.course] = { count: 0 };
    }
    map[r.course].count++;
  }

  return Object.entries(map)
    .map(([course, v]) => ({ course, count: v.count }))
    .sort((a, b) => b.count - a.count);
}

/* ============================
   ▼ Tier別集計
============================ */
function aggregateByTier(races) {
  const map = {};

  for (const r of races) {
    if (!r.tier) continue;

    if (!map[r.tier]) map[r.tier] = {};
    if (!map[r.tier][r.course]) map[r.tier][r.course] = 0;

    map[r.tier][r.course]++;
  }

  return map;
}

/* ============================
   ▼ Season別集計
============================ */
function aggregateBySeason(races) {
  const map = {};

  for (const r of races) {
    if (!r.season) continue;

    if (!map[r.season]) map[r.season] = {};
    if (!map[r.season][r.course]) map[r.season][r.course] = 0;

    map[r.season][r.course]++;
  }

  return map;
}

/* ============================
   ▼ 日別集計（YYYY-MM-DD）
============================ */
function aggregateDaily(races) {
  const map = {};

  for (const r of races) {
    const d = new Date(r.timestamp * 1000);
    const key = d.toISOString().slice(0, 10); // YYYY-MM-DD

    if (!map[key]) map[key] = {};
    if (!map[key][r.course]) map[key][r.course] = 0;

    map[key][r.course]++;
  }

  return map;
}

/* ============================
   ▼ 月別集計（YYYY-MM）
============================ */
function aggregateMonthly(races) {
  const map = {};

  for (const r of races) {
    const d = new Date(r.timestamp * 1000);
    const key = d.toISOString().slice(0, 7); // YYYY-MM

    if (!map[key]) map[key] = {};
    if (!map[key][r.course]) map[key][r.course] = 0;

    map[key][r.course]++;
  }

  return map;
}

/* ============================
   ▼ リスト描画
============================ */
function renderList(el, items, total) {
  el.innerHTML = "";
  items.forEach((item, i) => {
    const rate = ((item.count / total) * 100).toFixed(2);
    const encoded = encodeURIComponent(item.course);

    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <span class="rank">${i+1}位</span>
      <a href="course.html?course=${encoded}">${item.course}</a>
      <span>（${item.count}回 / ${rate}%）</span>
    `;
    el.appendChild(div);
  });
}

/* ============================
   ▼ セレクトボックス描画
============================ */
function renderOptions(select, keys) {
  select.innerHTML = "";
  keys.forEach(k => {
    const op = document.createElement("option");
    op.value = k;
    op.textContent = k;
    select.appendChild(op);
  });
}

/* ============================
   ▼ メイン処理
============================ */
loadAllData().then(races => {
  const total = races.length;

  // 全体ランキング
  const overall = aggregateByCourse(races);
  renderList(document.getElementById("overallList"), overall, total);

  // Tier別
  const byTier = aggregateByTier(races);
  const tierKeys = Object.keys(byTier);
  renderOptions(document.getElementById("tierSelect"), tierKeys);

  function updateTier() {
    const key = document.getElementById("tierSelect").value;
    const list = Object.entries(byTier[key])
      .map(([course, count]) => ({ course, count }))
      .sort((a,b)=>b.count - a.count);
    renderList(document.getElementById("tierList"), list, total);
  }
  document.getElementById("tierSelect").onchange = updateTier;
  updateTier();

  // Season別
  const bySeason = aggregateBySeason(races);
  const seasonKeys = Object.keys(bySeason);
  renderOptions(document.getElementById("seasonSelect"), seasonKeys);

  function updateSeason() {
    const key = document.getElementById("seasonSelect").value;
    const list = Object.entries(bySeason[key])
      .map(([course, count]) => ({ course, count }))
      .sort((a,b)=>b.count - a.count);
    renderList(document.getElementById("seasonList"), list, total);
  }
  document.getElementById("seasonSelect").onchange = updateSeason;
  updateSeason();

  // 日別
  const daily = aggregateDaily(races);
  const dailyKeys = Object.keys(daily).sort();
  renderOptions(document.getElementById("dailySelect"), dailyKeys);

  function updateDaily() {
    const key = document.getElementById("dailySelect").value;
    const list = Object.entries(daily[key])
      .map(([course, count]) => ({ course, count }))
      .sort((a,b)=>b.count - a.count);
    renderList(document.getElementById("dailyList"), list, total);
  }
  document.getElementById("dailySelect").onchange = updateDaily;
  updateDaily();

  // 月別
  const monthly = aggregateMonthly(races);
  const monthlyKeys = Object.keys(monthly).sort();
  renderOptions(document.getElementById("monthlySelect"), monthlyKeys);

  function updateMonthly() {
    const key = document.getElementById("monthlySelect").value;
    const list = Object.entries(monthly[key])
      .map(([course, count]) => ({ course, count }))
      .sort((a,b)=>b.count - a.count);
    renderList(document.getElementById("monthlyList"), list, total);
  }
  document.getElementById("monthlySelect").onchange = updateMonthly;
  updateMonthly();
});
</script>

</body>
</html>
