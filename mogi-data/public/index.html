<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="dashboard.css">
<title>全体集計ダッシュボード</title>
<style>
body { font-family: sans-serif; padding: 20px; }
h1 { margin-bottom: 20px; }
h2 { margin-top: 40px; }
.list { margin-top: 10px; }
.item { padding: 6px 0; border-bottom: 1px solid #ddd; }
.rank { font-weight: bold; margin-right: 10px; }
.section { margin-top: 30px; }
select { padding: 8px; font-size: 16px; margin-right: 10px; }
a { color: #0077cc; text-decoration: none; }
a:hover { text-decoration: underline; }
.filterBox { margin-bottom: 20px; }
</style>
</head>
<body>

<h1>全体集計ダッシュボード</h1>

<div class="filterBox">
  <label>モード：</label>
  <select id="filterMode" class="filter">
    <option value="all">すべて</option>
    <option value="lounge">ラウンジ</option>
    <option value="tournament">大会</option>
    <option value="nora">野良</option>
  </select>

  <label>Tier：</label>
  <select id="filterTier" class="filter">
    <option value="all">すべて</option>
  </select>

  <label>Season：</label>
  <select id="filterSeason" class="filter">
    <option value="all">すべて</option>
  </select>

  <label>日付：</label>
  <input type="date" id="filterDate" class="filter">

  <label>月：</label>
  <input type="month" id="filterMonth" class="filter">
</div>

<h2>コース別ランキング（フィルター適用後）</h2>
<div id="rankingList" class="list"></div>

<script>
/* ============================
   ▼ all.json を読み込む
============================ */
async function loadAllData() {
  const res = await fetch("data/all.json");
  const json = await res.json();
  return json.races;
}

/* ============================
   ▼ フィルター適用
============================ */
function applyFilters(races) {
  let filtered = [...races];

  const mode = document.getElementById("filterMode").value;
  const tier = document.getElementById("filterTier").value;
  const season = document.getElementById("filterSeason").value;
  const date = document.getElementById("filterDate").value;
  const month = document.getElementById("filterMonth").value;

  if (mode !== "all") {
    filtered = filtered.filter(r => r.mode === mode);
  }

  if (tier !== "all") {
    filtered = filtered.filter(r => r.tier === tier);
  }

  if (season !== "all") {
    filtered = filtered.filter(r => r.season === season);
  }

  if (date) {
    filtered = filtered.filter(r => {
      const d = new Date(r.timestamp * 1000).toISOString().slice(0, 10);
      return d === date;
    });
  }

  if (month) {
    filtered = filtered.filter(r => {
      const m = new Date(r.timestamp * 1000).toISOString().slice(0, 7);
      return m === month;
    });
  }

  return filtered;
}

/* ============================
   ▼ コース別集計
============================ */
function aggregateByCourse(races) {
  const map = {};

  races.forEach(r => {
    if (!map[r.course]) map[r.course] = 0;
    map[r.course]++;
  });

  return Object.entries(map)
    .map(([course, count]) => ({ course, count }))
    .sort((a, b) => b.count - a.count);
}

/* ============================
   ▼ ランキング描画
============================ */
function renderRanking(el, list, total) {
  el.innerHTML = "";

  list.forEach((item, i) => {
    const rate = ((item.count / total) * 100).toFixed(2);
    const encoded = encodeURIComponent(item.course);

    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <span class="rank">${i+1}位</span>
      <a href="course.html?course=${encoded}">${item.course}</a>
      <span>（${item.count}回 / ${rate}%）</span>
    `;
    el.appendChild(div);
  });
}

/* ============================
   ▼ Tier / Season の選択肢生成
============================ */
function initTierSeasonOptions(races) {
  const tierSet = new Set();
  const seasonSet = new Set();

  races.forEach(r => {
    if (r.mode === "lounge") {
      if (r.tier) tierSet.add(r.tier);
      if (r.season) seasonSet.add(r.season);
    }
  });

  const tierSelect = document.getElementById("filterTier");
  tierSet.forEach(t => {
    const op = document.createElement("option");
    op.value = t;
    op.textContent = t;
    tierSelect.appendChild(op);
  });

  const seasonSelect = document.getElementById("filterSeason");
  seasonSet.forEach(s => {
    const op = document.createElement("option");
    op.value = s;
    op.textContent = s;
    seasonSelect.appendChild(op);
  });
}

/* ============================
   ▼ メイン処理
============================ */
let allRaces = [];

async function updateRanking() {
  const filtered = applyFilters(allRaces);
  const list = aggregateByCourse(filtered);
  renderRanking(document.getElementById("rankingList"), list, filtered.length);
}

(async function() {
  allRaces = await loadAllData();
  initTierSeasonOptions(allRaces);

  document.querySelectorAll(".filter").forEach(el => {
    el.onchange = updateRanking;
  });

  updateRanking();
})();
</script>

</body>
</html>
