<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="stylesheet" href="course.css">
<meta charset="UTF-8">
<title>コース詳細</title>
<style>
body { font-family: sans-serif; padding: 20px; }
h1 { margin-bottom: 10px; }
h2 { margin-top: 30px; }
.item { padding: 6px 0; border-bottom: 1px solid #ddd; }
.stat { margin: 4px 0; }
</style>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<h1 id="courseTitle"></h1>

<div id="basicStats"></div>

<h2>モード別割合（全ユーザー）</h2>
<div id="modeDist"></div>

<h2>Tier別割合（ラウンジのみ）</h2>
<div id="tierDist"></div>

<h2>Season別割合（ラウンジのみ）</h2>
<div id="seasonDist"></div>

<h2>Tier別勝率（全ユーザー）</h2>
<div id="tierWinRate"></div>

<h2>Season別勝率推移（全ユーザー）</h2>
<canvas id="seasonChart" width="400" height="200"></canvas>

<script>
/* ============================
   ▼ all.json を読み込む
============================ */
async function loadAllData() {
  const res = await fetch("data/all.json");
  const json = await res.json();
  return json.races;
}

/* ============================
   ▼ URL パラメータからコース名取得
============================ */
function getCourseName() {
  const params = new URLSearchParams(location.search);
  return params.get("course");
}

/* ============================
   ▼ モード別割合
============================ */
function calcModeDistribution(records) {
  const dist = { lounge: 0, tournament: 0, nora: 0 };

  records.forEach(r => {
    if (dist[r.mode] !== undefined) dist[r.mode]++;
  });

  return dist;
}

/* ============================
   ▼ Tier別割合（ラウンジのみ）
============================ */
function calcTierDistribution(records) {
  const dist = {};

  records.forEach(r => {
    if (r.mode !== "lounge") return;
    if (!dist[r.tier]) dist[r.tier] = 0;
    dist[r.tier]++;
  });

  return dist;
}

/* ============================
   ▼ Season別割合（ラウンジのみ）
============================ */
function calcSeasonDistribution(records) {
  const dist = {};

  records.forEach(r => {
    if (r.mode !== "lounge") return;
    if (!dist[r.season]) dist[r.season] = 0;
    dist[r.season]++;
  });

  return dist;
}

/* ============================
   ▼ Tier別勝率（全ユーザー）
============================ */
function calcTierWinRate(records) {
  const map = {};

  records.forEach(r => {
    if (r.mode !== "lounge") return;
    if (!map[r.tier]) map[r.tier] = { total: 0, wins: 0 };

    map[r.tier].total++;
    if (r.rank === 1) map[r.tier].wins++;
  });

  return Object.entries(map)
    .map(([tier, v]) => ({
      tier,
      winRate: v.total ? (v.wins / v.total) : 0,
      total: v.total
    }))
    .sort((a, b) => b.winRate - a.winRate);
}

function renderTierWinRate(el, list) {
  el.innerHTML = "";
  list.forEach(item => {
    const div = document.createElement("div");
    div.className = "item";
    div.textContent =
      `${item.tier}： 勝率 ${(item.winRate * 100).toFixed(1)}%（${item.total}レース）`;
    el.appendChild(div);
  });
}

/* ============================
   ▼ Season別勝率推移（全ユーザー）
============================ */
function calcSeasonWinRate(records) {
  const map = {};

  records.forEach(r => {
    if (r.mode !== "lounge") return;
    if (!map[r.season]) map[r.season] = { total: 0, wins: 0 };

    map[r.season].total++;
    if (r.rank === 1) map[r.season].wins++;
  });

  return Object.entries(map)
    .map(([season, v]) => ({
      season,
      winRate: v.total ? (v.wins / v.total) : 0
    }))
    .sort((a, b) => a.season.localeCompare(b.season));
}

function renderSeasonChart(list) {
  const ctx = document.getElementById("seasonChart").getContext("2d");

  new Chart(ctx, {
    type: "line",
    data: {
      labels: list.map(x => x.season),
      datasets: [{
        label: "勝率（%）",
        data: list.map(x => (x.winRate * 100).toFixed(1)),
        borderColor: "rgba(75, 192, 192, 1)",
        backgroundColor: "rgba(75, 192, 192, 0.3)",
        tension: 0.2
      }]
    },
    options: {
      scales: {
        y: { beginAtZero: true, max: 100 }
      }
    }
  });
}

/* ============================
   ▼ リスト描画
============================ */
function renderDist(el, dist, total) {
  el.innerHTML = "";
  Object.entries(dist).forEach(([key, count]) => {
    const div = document.createElement("div");
    div.className = "item";
    const rate = ((count / total) * 100).toFixed(2);
    div.textContent = `${key}： ${count}回（${rate}%）`;
    el.appendChild(div);
  });
}

/* ============================
   ▼ メイン処理
============================ */
(async function() {
  const course = getCourseName();
  document.getElementById("courseTitle").textContent = course;

  const races = await loadAllData();
  const filtered = races.filter(r => r.course === course);

  const total = filtered.length;

  // 基本統計（総レース数のみ）
  document.getElementById("basicStats").innerHTML =
    `<div class="stat">総レース数：${total}</div>`;

  // モード別
  renderDist(document.getElementById("modeDist"), calcModeDistribution(filtered), total);

  // Tier別
  renderDist(document.getElementById("tierDist"), calcTierDistribution(filtered), total);

  // Season別
  renderDist(document.getElementById("seasonDist"), calcSeasonDistribution(filtered), total);

  // Tier別勝率
  const tierWin = calcTierWinRate(filtered);
  renderTierWinRate(document.getElementById("tierWinRate"), tierWin);

  // Season別勝率推移
  const seasonWin = calcSeasonWinRate(filtered);
  renderSeasonChart(seasonWin);
})();
</script>

</body>
</html>
